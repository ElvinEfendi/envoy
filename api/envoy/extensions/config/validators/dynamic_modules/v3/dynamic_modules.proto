syntax = "proto3";

package envoy.extensions.config.validators.dynamic_modules.v3;

import "envoy/extensions/dynamic_modules/v3/dynamic_modules.proto";

import "google/protobuf/any.proto";

import "udpa/annotations/status.proto";
import "validate/validate.proto";

option java_package = "io.envoyproxy.envoy.extensions.config.validators.dynamic_modules.v3";
option java_outer_classname = "DynamicModulesProto";
option java_multiple_files = true;
option go_package = "github.com/envoyproxy/go-control-plane/envoy/extensions/config/validators/dynamic_modules/v3;dynamic_modulesv3";
option (udpa.annotations.file_status).package_version_status = ACTIVE;

// [#protodoc-title: Dynamic Modules Config Validator]
// [#extension: envoy.config.validators.dynamic_modules]

// Configuration for an xDS config validator implemented by a dynamic module.
//
// The validator receives decoded xDS resources as serialized protobuf bytes together with their
// resource names and the xDS type URL for the update. A rejection from the dynamic module is
// translated to Envoy's normal xDS config rejection path, causing the xDS client to NACK the
// update.
message DynamicModuleConfigValidator {
  // The dynamic module configuration.
  //
  // This extension supports loading by ``name`` or ``module.local.filename``. Remote module sources
  // are not supported because config validators are created without an asynchronous initialization
  // context.
  envoy.extensions.dynamic_modules.v3.DynamicModuleConfig dynamic_module_config = 1
      [(validate.rules).message = {required: true}];

  // The name to identify the config validator implementation within the module.
  // This is passed to the module's ``envoy_dynamic_module_on_config_validator_config_new``
  // function.
  string extension_name = 2 [(validate.rules).string = {min_len: 1}];

  // The configuration for the module's config validator implementation.
  //
  // ``google.protobuf.Struct`` is serialized as JSON before passing it to the module.
  // ``google.protobuf.BytesValue`` and ``google.protobuf.StringValue`` are passed directly
  // without the wrapper. Otherwise, the serialized bytes of the configured protobuf message are
  // passed.
  google.protobuf.Any extension_config = 3;

  // The xDS resource type URL handled by this validator.
  //
  // Only updates whose ``DiscoveryResponse.type_url`` or ``DeltaDiscoveryResponse.type_url``
  // matches this value invoke the dynamic module validator.
  string type_url = 4 [(validate.rules).string = {min_len: 1}];
}
